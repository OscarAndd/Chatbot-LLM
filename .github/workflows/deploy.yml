name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push backend
        run: |
          docker build -t oscar202601/chat-backend:latest ./Back
          docker push oscar202601/chat-backend:latest

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push frontend
        run: |
          docker build -t oscar202601/chat-frontend:latest ./Front
          docker push oscar202601/chat-frontend:latest

  deploy-to-vps:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "📥 Descargando imágenes nuevas..."
            docker pull oscar202601/chat-backend:latest
            docker pull oscar202601/chat-frontend:latest

            echo "🛑 Deteniendo contenedores actuales..."
            docker stop backend chat-frontend || true
            docker rm backend chat-frontend || true

            echo "🚀 Iniciando backend..."
            docker run -d \
              --name backend \
              --restart unless-stopped \
              -p 8000:8000 \
              -e TOGETHER_API_KEY=${{ secrets.TOGETHER_API_KEY }} \
              oscar202601/chat-backend:latest

            echo "🚀 Iniciando frontend..."
            docker run -d \
              --name chat-frontend \
              --restart unless-stopped \
              -p 3000:80 \
              oscar202601/chat-frontend:latest

            echo "🧹 Limpiando imágenes viejas..."
            docker image prune -f

            echo "✅ Deploy completado!"